version: '3.8'

services:
  # Database Service (Postgres)
  db:
    image: postgres:15-alpine
    container_name: apextrade-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: stock_dashboard
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d stock_dashboard"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Caching Service (Redis)
  redis:
    image: redis:7-alpine
    container_name: apextrade-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Stock Analytics Backend Engine
  backend:
    build: ./backend
    container_name: apextrade-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=stock_dashboard
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # React Frontend Dashboard
  frontend:
    build: ./frontend
    container_name: apextrade-frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
